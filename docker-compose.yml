services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nearly}
      POSTGRES_USER: ${POSTGRES_USER:-nearly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nearly}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nearly"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./api:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nearly}:${POSTGRES_PASSWORD:-nearly}@postgres:5432/${POSTGRES_DB:-nearly}
      NODE_ENV: development
    restart: unless-stopped

volumes:
  pgdata:
